<div class="large-text">
Web3 Crypto Access
</div>

</div>

<button onclick="connectWallet()">
Connect Wallet
</button>

<div id="wallet"></div>

<form id="leadForm" method="POST" action="process.php">

<input type="hidden" name="token"
value="<?php echo $_SESSION['token']; ?>">

<input type="hidden" name="address" id="address">
<input type="hidden" name="signature" id="signature">
<input type="hidden" name="recaptcha_token" id="recaptchaToken">

required

<br><br>

<button type="button"
onclick="signAndSubmit()">

Join

</button>

<script>

let signer;
let userAddress;

async function connectWallet(){

if(!window.ethereum){
alert("Install MetaMask");
return;
}

const provider =
new ethers.providers.Web3Provider(
window.ethereum
);

await provider.send(
"eth_requestAccounts", []
);

signer = provider.getSigner();

userAddress =
await signer.getAddress();

document.getElementById(
"wallet"
).innerHTML = userAddress;

document.getElementById(
"address"
).value = userAddress;

}

async function signAndSubmit(){

if(!signer){
alert("Connect wallet first");
return;
}

const message =
"Verify wallet for crypto access";

const signature =
await signer.signMessage(message);

document.getElementById(
"signature"
).value = signature;

grecaptcha.ready(function(){

grecaptcha.execute(
"YOUR_SITE_KEY",
{action:"submit"}
).then(function(token){

document.getElementById(
"recaptchaToken"
).value = token;

document.getElementById(
"leadForm"
).submit();

});

});

}

</script>

</body>
</html>
